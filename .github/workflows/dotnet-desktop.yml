name: .NET Framework Desktop Build

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore MeteoApp.sln

      - name: Build solution
        run: msbuild MeteoApp.sln /p:Configuration=Release /p:Platform="AnyCPU"

      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path "bin\Release\MeteoApp.exe")) {
            throw "Build failed: MeteoApp.exe not found."
          }

      - name: Create ZIP package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "bin\Release\*" `
            -DestinationPath "MeteoApp-release.zip" `
            -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeteoApp-release
          path: MeteoApp-release.zip

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "v1.0.${{ github.run_number }}"

          if ((git tag -l $version) -eq $version) {
            Write-Host "Tag already exists."
          }
          else {
            git tag $version
            git push origin $version
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: MeteoApp-release.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
