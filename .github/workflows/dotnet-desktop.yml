name: Build .NET Framework Desktop App

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore MeteoApp.sln

      - name: Build solution
        run: msbuild MeteoApp.sln /p:Configuration=Release

      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path "bin\Release\MeteoApp.exe")) {
            Write-Host "Contents of bin:"
            if (Test-Path "bin") {
              Get-ChildItem -Recurse "bin"
            } else {
              Write-Host "bin folder not found."
            }
            throw "MeteoApp.exe not found."
          }

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "bin\Release\*" `
            -DestinationPath "MeteoApp-release.zip" `
            -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeteoApp-release
          path: MeteoApp-release.zip

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v1.0.${{ github.run_number }}"

          $exists = git tag -l $tag

          if ($exists -eq $tag) {
              Write-Host "Tag already exists."
          }
          else {
              git tag $tag
              git push origin $tag
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: MeteoApp-release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
