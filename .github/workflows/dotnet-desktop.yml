name: .NET Framework Desktop Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore MeteoApp.sln

      - name: Build solution
        run: msbuild MeteoApp.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU"
